<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Iván Fraga Prado</title>
    <link rel="icon" href="./assets/img/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/principal.css">
	<script defer src="./js/principal.js"></script>

</head>
<body>
    <div id="marco">
        <header class="cabecera">
            <div class="cabecera__info">
                <img src="./assets/img/favicon.png" alt="Logo personal de Iván Fraga Prado" class="logo">
                <div>
                    <h1 class="cabecera__nombre">Iván Fraga Prado</h1>
                    <h2 class="cabecera__rol">Estudiante de DAM - Desarrollador en formación</h2>
                </div>
            </div>
        </header>

        <section id="titulo-principal">
            <h1>Explora mi portfolio</h1>
        </section>

        <main id="tablero" aria-label="Secciones principales del portfolio">
            <a href="./src/sobre-mi.html" class="nota">
                <figure class="nota__contenido">
                    <div class="nota__icono nota__icono--sobre-mi" aria-hidden="true">🙂</div>
                    <figcaption>Sobre mí</figcaption>
                </figure>
            </a>

            <a href="./src/estudios.html" class="nota">
                <figure class="nota__contenido">
                    <div class="nota__icono nota__icono--estudios" aria-hidden="true">🎓</div>
                    <figcaption>Estudios</figcaption>
                </figure>
            </a>

            <a href="./src/intereses.html" class="nota">
                <figure class="nota__contenido">
                    <div class="nota__icono nota__icono--intereses" aria-hidden="true">⭐</div>
                    <figcaption>Intereses</figcaption>
                </figure>
            </a>

            <a href="./src/proyectos.html" class="nota">
                <figure class="nota__contenido">
                    <div class="nota__icono nota__icono--proyectos" aria-hidden="true">💡</div>
                    <figcaption>Proyectos</figcaption>
                </figure>
            </a>

            <a href="./src/contacto.html" class="nota">
                <figure class="nota__contenido">
                    <div class="nota__icono nota__icono--contacto" aria-hidden="true">✉️</div>
                    <figcaption>Contacto</figcaption>
                </figure>
            </a>
        </main>
    </div>

	<section id="zona-juego">
		<h2>Zona interactiva</h2>
		<div id="marco-juego">
			<div id="pelota"></div>
			<div id="cursor">
				<img src="./assets/img/principal/cursor.png" alt="cursor">
			</div>
		</div>
	</section>

</body>
</html>
